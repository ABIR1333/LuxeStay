# ============================================================
# LUXESTAY — APPLICATION PROPERTIES
# ============================================================

# Server
server.port=8081
server.servlet.context-path=/api

# Application name
spring.application.name=luxestay-backend

# ============================================================
# DATABASE
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/luxestay_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# JWT
# ============================================================
app.jwt.secret=LuxeStay@SecretKey#2025$HotelManagement!JWT@Secure256BitsKey
app.jwt.expiration=86400000

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:4200

# ============================================================
# LOGGING
# ============================================================
logging.level.root=INFO
logging.level.com.luxestay=DEBUG
logging.level.org.springframework.security=INFO
